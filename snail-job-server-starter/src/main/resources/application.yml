server:
  port: 8081
  servlet:
    context-path: /snail-job

spring:
  main:
    banner-mode: console # 开启 Banner，启动成功看得更清楚
  profiles:
    active: dev

  # 数据库配置
  datasource:
    name: snail_job
    type: com.zaxxer.hikari.HikariDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/snail_job?useSSL=false&characterEncoding=utf8&useUnicode=true&serverTimezone=Asia/Shanghai
    username: root
    password: ryc123 # 已保留你的密码
    hikari:
      connection-timeout: 30000
      minimum-idle: 5
      maximum-pool-size: 100
      auto-commit: true
      idle-timeout: 30000
      pool-name: snail_job
      max-lifetime: 1800000

  # Redis 配置 (确保你的 Redis 已经启动)
  data:
    redis:
      host: localhost
      port: 6379
      password: # 如果本地 Redis 没有密码，这里留空
      database: 0

  web:
    resources:
      static-locations: classpath:admin/

mybatis-plus:
  typeAliasesPackage: com.aizuda.snailjob.template.datasource.persistence.po
  global-config:
    db-config:
      where-strategy: NOT_EMPTY
      capital-mode: false
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: true

logging:
  config: classpath:logback-boot.xml
  level:
    root: info  # 修复点：添加了默认的根日志级别
    com.aizuda.snailjob: info # 修复点：添加了项目自身的日志级别
    # 如果想看详细的 SQL 日志，可以取消下面这一行的注释
    # com.aizuda.snailjob.template.datasource.persistence.mapper: debug

snail-job:
  retry-pull-page-size: 1000
  job-pull-page-size: 1000
  server-port: 17888
  log-storage: 7
  rpc-type: GRPC